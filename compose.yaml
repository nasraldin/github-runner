name: github-runners

x-runner-environment: &runner-environment
  GITHUB_OWNER: ${GITHUB_OWNER:?Set GITHUB_OWNER in .env for single-pool mode}
  GITHUB_REPO: ${GITHUB_REPO:?Set GITHUB_REPO in .env for single-pool mode}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  GITHUB_RUNNER_REGISTRATION_TOKEN: ${GITHUB_RUNNER_REGISTRATION_TOKEN:-}
  RUNNER_NAME_PREFIX: ${RUNNER_NAME_PREFIX:-github-runner}
  RUNNER_GROUP: ${RUNNER_GROUP:-Default}
  RUNNER_LABELS: ${RUNNER_LABELS:-self-hosted,linux,x64,docker}
  RUNNER_WORKDIR: ${RUNNER_WORKDIR:-_work}
  RUNNER_EPHEMERAL: ${RUNNER_EPHEMERAL:-true}
  RUNNER_REPLACE_EXISTING: ${RUNNER_REPLACE_EXISTING:-true}
  RUNNER_DISABLE_UPDATE: ${RUNNER_DISABLE_UPDATE:-false}
  DOCKER_GID: ${DOCKER_GID:-}

services:
  runner:
    image: ${RUNNER_IMAGE:-github-runner-manager:local}
    platform: ${RUNNER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: runner/Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-node:lts-bullseye}
        RUNNER_VERSION: ${RUNNER_VERSION:-2.335.1}
        RUNNER_SHA256: ${RUNNER_SHA256:-4ef2f25285f0ae4477f1fe1e346db76d2f3ebf03824e2ddd1973a2819bf6c8cf}
    restart: unless-stopped
    init: true
    environment:
      <<: *runner-environment
    volumes:
      # Docker-outside-of-Docker. This is required for workflows that run docker/buildx.
      - /var/run/docker.sock:/var/run/docker.sock
      # Speeds up setup-node/setup-python style actions across ephemeral runner restarts.
      - runner-toolcache:/opt/hostedtoolcache
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD-SHELL", "test -f /home/runner/actions-runner/.runner"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 1G

volumes:
  runner-toolcache:
